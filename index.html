<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filament Collection Town</title>
  <meta name="description" content="A visual reference of 3D printing filaments organized by material type." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ede8df;
      --surface:      #f6f2eb;
      --card:         #fefcf8;
      --border:       #d6cdbf;
      --border-strong: #b8ad9d;
      --accent:       #c85e2a;
      --accent-soft:  rgba(200, 94, 42, 0.10);
      --text:         #1c1610;
      --muted:        #7a6c5d;
      --muted-soft:   rgba(122, 108, 93, 0.28);
      --radius:       9px;
      --shadow-sm:    0 1px 3px rgba(28,22,16,0.07), 0 1px 2px rgba(28,22,16,0.05);
      --shadow-md:    0 4px 14px rgba(28,22,16,0.10), 0 2px 4px rgba(28,22,16,0.07);
      --shadow-lg:    0 24px 60px rgba(28,22,16,0.22), 0 8px 24px rgba(28,22,16,0.12);
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────────── */
    header {
      padding: 52px 24px 0;
      max-width: 1200px;
      margin: 0 auto;
    }
    .header-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.38em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 6vw, 4.4rem);
      font-weight: 600;
      line-height: 1.0;
      color: var(--text);
      letter-spacing: -0.015em;
    }
    header h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--muted);
    }
    .header-rule { height: 1px; background: var(--border); margin-top: 22px; }

    /* ── STATS BAR ──────────────────────────────────────────────────────────── */
    .stats-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .stat { display: flex; align-items: baseline; gap: 6px; padding-right: 24px; }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      transition: color 0.3s;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .stat-divider {
      width: 1px; height: 22px;
      background: var(--border);
      margin-right: 24px;
      flex-shrink: 0;
    }

    /* ── PRINT HERO ──────────────────────────────────────────────────────────── */
    .print-hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .print-hero-img-wrap {
      flex: 0 0 160px;
      height: 120px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 2px solid var(--accent);
      position: relative;
    }
    @keyframes hero-border-pulse {
      0%, 100% { border-color: var(--accent); }
      50% { border-color: rgba(200,94,42,0.35); }
    }
    .print-hero-img-wrap { animation: hero-border-pulse 2.4s ease-in-out infinite; }
    .print-hero-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .print-hero-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .print-hero-placeholder svg { color: var(--muted); opacity: 0.5; }
    .print-hero-info { flex: 1; min-width: 0; }
    .print-hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.56rem; font-weight: 700;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--accent);
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 6px;
    }
    @keyframes hero-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .print-hero-eyebrow::before {
      content: ""; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      animation: hero-dot 1.4s ease-in-out infinite;
    }
    .print-hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600; line-height: 1.1;
      color: var(--text); letter-spacing: -0.01em;
    }
    .print-hero-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.56rem; letter-spacing: 0.16em;
      color: var(--muted); text-transform: uppercase;
      margin-top: 8px;
    }
    @media (prefers-reduced-motion: reduce) {
      .print-hero-img-wrap { animation: none; border-color: var(--accent); }
      .print-hero-eyebrow::before { animation: none; }
    }
    @media (max-width: 560px) {
      .print-hero { flex-direction: column; align-items: stretch; gap: 14px; padding: 18px 16px; }
      .print-hero-img-wrap { flex: none; width: 100%; height: 140px; }
    }

    /* ── AMS BAY ────────────────────────────────────────────────────────────── */
    .ams-bay {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 22px;
      border-bottom: 1px solid var(--border);
    }
    .ams-bay-head {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px;
    }
    .ams-bay-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--text); display: flex; align-items: center; gap: 8px;
    }
    .ams-bay-label::before {
      content: ""; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(200,94,42,0.18);
    }
    .ams-bay-rule { flex: 1; height: 1px; background: var(--border); }
    .ams-bay-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.22em;
      color: var(--muted); text-transform: uppercase;
    }

    .ams-slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .ams-slot {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      padding: 18px 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      position: relative;
    }
    .ams-slot.empty { background: transparent; border-style: dashed; border-color: var(--border); box-shadow: none; }
    .ams-slot.loaded { cursor: pointer; }
    .ams-slot.loaded:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
    }

    /* ── PRINTING PULSE ─────────────────────────────────────────────────────── */
    @keyframes ams-pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--pulse-color, rgba(200,94,42,0.35)), var(--shadow-sm); }
      50% { box-shadow: 0 0 18px 4px var(--pulse-color, rgba(200,94,42,0.25)), var(--shadow-md); }
    }
    .ams-slot.printing {
      animation: ams-pulse 2.4s ease-in-out infinite;
      border-color: var(--accent);
    }
    .ams-slot.printing:hover { animation: none; }

    .slot-projection {
      display: flex; align-items: baseline; justify-content: center;
      gap: 4px; margin-top: 2px;
    }
    .slot-proj-arrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; color: var(--accent); font-weight: 700;
    }
    .slot-proj-end {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--accent); line-height: 0.9;
      letter-spacing: -0.02em;
    }
    .slot-proj-unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.54rem; font-weight: 600;
      color: var(--accent); letter-spacing: 0.04em;
    }

    .ams-bay-printing {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent);
    }
    @keyframes print-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .ams-bay-printing::before {
      content: ""; width: 7px; height: 7px;
      background: var(--accent); border-radius: 50%;
      animation: print-dot 1.4s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .ams-slot.printing { animation: none; border-color: var(--accent); box-shadow: 0 0 8px 2px rgba(200,94,42,0.2), var(--shadow-sm); }
      .ams-bay-printing::before { animation: none; opacity: 1; }
    }

    /* Progress ring wraps the disc, fill from --pct (0–100), colored by --ring-color */
    .slot-ring {
      --pct: 100;
      --end-pct: -1;
      --ring-color: var(--accent);
      width: 80px; height: 80px;
      border-radius: 50%;
      background:
        conic-gradient(
          var(--ring-color) 0deg,
          var(--ring-color) calc(var(--pct) * 3.6deg),
          rgba(122, 108, 93, 0.18) calc(var(--pct) * 3.6deg),
          rgba(122, 108, 93, 0.18) 360deg
        );
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .ams-slot.printing .slot-ring {
      background:
        conic-gradient(
          var(--ring-color) 0deg,
          var(--ring-color) calc(var(--end-pct) * 3.6deg),
          rgba(122, 108, 93, 0.18) calc(var(--end-pct) * 3.6deg),
          rgba(122, 108, 93, 0.18) 360deg
        );
    }

    .slot-end-mark {
      position: absolute;
      width: 2px; height: 10px;
      background: rgba(28, 22, 16, 0.7);
      top: 0; left: 50%;
      margin-left: -1px;
      transform-origin: 50% 40px;
      border-radius: 1px;
      z-index: 2;
      pointer-events: none;
    }

    @keyframes ring-drain {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }
    .ams-slot.printing .slot-ring::after {
      content: "";
      position: absolute; inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        transparent 0deg,
        transparent calc(var(--end-pct) * 3.6deg),
        var(--ring-color) calc(var(--end-pct) * 3.6deg),
        var(--ring-color) calc(var(--pct) * 3.6deg),
        transparent calc(var(--pct) * 3.6deg),
        transparent 360deg
      );
      -webkit-mask: radial-gradient(circle closest-side, transparent 87%, black 88%);
      mask: radial-gradient(circle closest-side, transparent 87%, black 88%);
      animation: ring-drain 2.4s ease-in-out infinite;
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .ams-slot.printing .slot-ring::after { animation: none; opacity: 0.5; }
    }
    .slot-ring::before {
      content: "";
      position: absolute; inset: 5px;
      background: var(--card);
      border-radius: 50%;
      z-index: 0;
    }
    .ams-slot.loaded:hover .slot-ring { filter: brightness(1.06); }
    .slot-ring.empty { background: none; }
    .slot-ring.empty::before { display: none; }

    /* Spool viewed end-on */
    .slot-disc {
      width: 62px; height: 62px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.18),
        inset 0 -10px 16px rgba(0,0,0,0.22),
        inset 0 4px 8px rgba(255,255,255,0.20),
        0 4px 14px rgba(0,0,0,0.10);
    }
    /* Concentric ring suggesting wound filament */
    .slot-disc::before {
      content: "";
      position: absolute; inset: 14%;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.10);
      pointer-events: none;
    }
    /* Center hub */
    .slot-disc::after {
      content: "";
      position: absolute; inset: 38%;
      background: radial-gradient(circle at 35% 35%, #5a4a3a, #1a1208);
      border-radius: 50%;
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.25),
        0 1px 2px rgba(0,0,0,0.3);
    }
    .slot-disc.empty {
      background: transparent !important;
      border: 2px dashed var(--border-strong);
      box-shadow: none;
      opacity: 0.55;
    }
    .slot-disc.empty::before, .slot-disc.empty::after { display: none; }

    .slot-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.24em; color: var(--muted);
    }
    .slot-num.active { color: var(--accent); }

    .slot-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.72rem; font-weight: 500;
      color: var(--text); line-height: 1.25;
      min-height: 2.4em; padding: 0 4px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .slot-name.empty {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.56rem; letter-spacing: 0.22em;
      color: var(--muted); text-transform: uppercase;
      font-weight: 600;
    }

    /* Weight readout — the key data for each slot */
    .slot-weight {
      display: flex; align-items: baseline; justify-content: center;
      gap: 3px; margin-top: 2px;
    }
    .slot-weight-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 700;
      color: var(--text); line-height: 0.9;
      letter-spacing: -0.02em;
    }
    .slot-weight-unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; font-weight: 600;
      color: var(--text); letter-spacing: 0.04em;
    }
    .slot-weight-of {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.54rem; color: var(--muted);
      letter-spacing: 0.1em; margin-left: 4px;
    }
    .slot-weight-placeholder {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--border-strong);
      letter-spacing: 0.1em;
    }

    .slot-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem; letter-spacing: 0.16em;
      color: var(--muted); text-transform: uppercase;
      font-weight: 600;
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 100px;
    }
    .slot-meta.rpla { color: #3a8a4a; border-color: rgba(58,138,74,0.3); background: rgba(58,138,74,0.06); }

    @media (max-width: 560px) {
      .ams-slots { gap: 8px; }
      .ams-slot { padding: 14px 6px 12px; gap: 8px; }
      .slot-ring { width: 64px; height: 64px; }
      .slot-disc { width: 50px; height: 50px; }
      .slot-name { font-size: 0.62rem; }
      .slot-weight-num { font-size: 1.15rem; }
      .slot-meta { display: none; }
    }

    /* ── CONTROLS ───────────────────────────────────────────────────────────── */
    .controls {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 0 0 230px; }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none; display: flex;
    }
    #search {
      width: 100%;
      padding: 8px 10px 8px 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm);
    }
    .pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); cursor: pointer;
      transition: all 0.14s;
      box-shadow: var(--shadow-sm);
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .pill.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 2px 10px rgba(200,94,42,0.28), var(--shadow-sm);
    }
    .pill-count { font-size: 0.56rem; opacity: 0.7; font-weight: 400; }
    .pill.active .pill-count { opacity: 0.85; }

    /* ── SECTION LABELS ─────────────────────────────────────────────────────── */
    .section-head {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 24px 14px;
      display: flex; align-items: baseline; gap: 14px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 700;
      color: var(--text); letter-spacing: -0.01em; white-space: nowrap;
    }
    .section-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── GRID ───────────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(218px, 1fr));
      gap: 16px; padding: 0 24px;
      max-width: 1200px; margin: 0 auto;
    }

    /* ── CARD ───────────────────────────────────────────────────────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) { .card { animation: none !important; } }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden; position: relative;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      animation: cardIn 0.4s cubic-bezier(0.2, 0.7, 0.2, 1) backwards;
      box-shadow: var(--shadow-sm);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--border-strong);
    }

    /* ── IMAGE AREA ─────────────────────────────────────────────────────────── */
    .card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; }
    .card-img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; cursor: zoom-in;
      transition: transform 0.32s ease;
    }
    .card:hover .card-img { transform: scale(1.04); }

    /* Swatch — color fills the whole image area */
    .card-swatch {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 24px; text-align: center;
      position: relative;
    }
    .card-swatch::after {
      content: "";
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 128px;
      pointer-events: none; mix-blend-mode: overlay;
    }
    .swatch-orb {
      width: 68px; height: 68px; border-radius: 50%;
      box-shadow:
        inset 0 -10px 18px rgba(0,0,0,0.22),
        inset 0 5px 10px rgba(255,255,255,0.28),
        0 8px 24px rgba(0,0,0,0.20);
      position: relative; z-index: 1;
    }
    .swatch-orb::after {
      content: "";
      position: absolute; top: 10%; left: 15%;
      width: 30%; height: 22%;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      filter: blur(4px);
    }
    .swatch-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.64rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      position: relative; z-index: 1;
    }

    /* ── OVERLAYS ───────────────────────────────────────────────────────────── */
    .weight-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(254,252,248,0.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(214,205,191,0.7);
      border-radius: 6px; padding: 5px 8px;
      display: flex; align-items: center; gap: 6px;
      z-index: 5; box-shadow: var(--shadow-sm);
    }

function swatchFor(f) {

function statusClass(label) {

function matBadge(f) {
  if (f.is_recycled) return { cls:"m-rpla", text:"rPLA" };

  if (m === "petg")  return { cls:"m-petg",  text:"PETG"  };
  return { cls:"m-other", text:f.material };
}

function computeStats() {
  let total = 0, weightG = 0, ams = 0, inbound = 0,
      cntPla = 0, cntHtpla = 0, cntPetg = 0;
  FILAMENTS.forEach(function(f) {
    total++;
    weightG += f.remaining || 0;
    if (f["ams-slot"] != null) ams++;
    if (f.delivery === "on-the-way") inbound++;
    const m = f.material.toLowerCase();
    if (m === "pla") cntPla++;
    else if (m === "htpla") cntHtpla++;
    else if (m === "petg") cntPetg++;
  });
  document.getElementById("stat-total").textContent   = total;
  document.getElementById("stat-weight").textContent  = (weightG / 1000).toFixed(1) + "kg";
  document.getElementById("stat-ams").textContent     = ams;
  document.getElementById("stat-inbound").textContent = inbound;
  if (ams > 0) document.getElementById("stat-ams").classList.add("accent");
  document.getElementById("cnt-all").textContent     = total;
  document.getElementById("cnt-pla").textContent     = cntPla;
  document.getElementById("cnt-htpla").textContent   = cntHtpla;
  document.getElementById("cnt-petg").textContent    = cntPetg;
  document.getElementById("cnt-ams").textContent     = ams;
  document.getElementById("cnt-inbound").textContent = inbound;
}

function buildCard(f, globalIdx) {
  const card = mk("div", "card");

  const wrap = mk("div", "card-img-wrap");

  if (f.image) {
    const img = mk("img", "card-img lb-trigger");
    img.src = f.image;
    img.alt = f.name;
    img.dataset.idx = lbData.length;
    img.loading = lbData.length < 6 ? "eager" : "lazy";
    lbData.push(f);
    wrap.appendChild(img);
  } else {
    const sw = swatchFor(f);
    wrap.classList.add("card-swatch");
    wrap.style.background = sw.grad;
    wrap.style.color = sw.text;
    const orb = mk("div", "swatch-orb");

    banner.appendChild(txt("span", null, "→"));
    banner.appendChild(txt("span", null, " In Transit"));
    wrap.appendChild(banner);
  }

  // Count badge
  if (f.count > 1) {
    wrap.appendChild(txt("div", "count-badge", f.count + "×"));
  }

  // Weight badge
  const weightNum = parseInt(f.weight) || 0;
  if (f.weight) {
    const wb = mk("div", "weight-badge");
    const iconSpan = mk("span", null);
    // Static SVG, no user data
    iconSpan.innerHTML = weightNum <= 50 ? SVG_SAMPLE : SVG_SPOOL;
    wb.appendChild(iconSpan);
    if (f.used > 0 && weightNum > 0) {
      const pct = Math.max(0, Math.min(100, (f.remaining / weightNum) * 100));
      const info = mk("div", "weight-info");
      const numEl = mk("div", "weight-num");
      numEl.appendChild(document.createTextNode(Math.round(f.remaining) + "g "));
      numEl.appendChild(txt("small", null, "/ " + weightNum + "g"));
      const bar = mk("div", "weight-bar");
      const fill = mk("div", "weight-fill");
      fill.style.width = pct + "%";
      bar.appendChild(fill);
      info.appendChild(numEl);
      info.appendChild(bar);
      wb.appendChild(info);
    } else {
      wb.appendChild(txt("div", "weight-num", f.weight));
    }
    wrap.appendChild(wb);
  }

  // Status chip
  if (f.label) {
    const chip = mk("div", "status-chip " + statusClass(f.label));
    chip.appendChild(mk("span", "status-dot"));
    chip.appendChild(document.createTextNode(f.label));
    wrap.appendChild(chip);
  }

  // Recycled badge — prominent green circular SVG mark
  if (f.is_recycled) {
    const rb = mk("div", "recycled-badge");
    rb.title = "Recycled material";
    rb.setAttribute("aria-label", "Recycled material");
    // Static SVG, no user data
    rb.innerHTML = SVG_RECYCLE;
    wrap.appendChild(rb);

  card.appendChild(wrap);

  const body = mk("div", "card-body");
  body.appendChild(txt("div", "card-name", f.name));
  const meta = mk("div", "card-meta");
  const mb = matBadge(f);
  meta.appendChild(txt("span", "mat-badge " + mb.cls, mb.text));
  const spoolSub = SPOOL_LABEL[f.spool] || f.spool || "";
  if (spoolSub) meta.appendChild(txt("span", "card-sub", spoolSub));
  body.appendChild(meta);
  card.appendChild(body);

  return card;
}

// ── Render ────────────────────────────────────────────────────────────────────
var activeFilter = "all";
var searchQuery  = "";

function render() {
  const gallery = document.getElementById("gallery");
  while (gallery.firstChild) gallery.removeChild(gallery.firstChild);
  lbData = [];

  const q = searchQuery.trim().toLowerCase();

  function keeps(f) {
    if (q && !f.name.toLowerCase().includes(q) && !(f.color || "").toLowerCase().includes(q)) return false;
    if (activeFilter === "in-ams")  return f["ams-slot"] != null;
    if (activeFilter === "inbound") return f.delivery === "on-the-way";
    if (activeFilter === "all")     return true;
    return f.material === activeFilter;
  }

  var inHand = {}, inTransit = [];
  FILAMENTS.forEach(function(f) {
    if (!keeps(f)) return;
    if (f.delivery === "on-the-way") { inTransit.push(f); return; }
    if (!inHand[f.material]) inHand[f.material] = [];
    inHand[f.material].push(f);
  });

  var total = 0;
  const ORDER = ["PLA", "HTPLA", "PETG", "Support"];

  function renderSection(title, sub, items) {
    if (!items || !items.length) return;
    const head = mk("div", "section-head");
    head.appendChild(txt("span", "section-title", title));
    if (sub) head.appendChild(txt("span", "section-sub", sub));
    head.appendChild(mk("div", "section-line"));
    gallery.appendChild(head);

    const grid = mk("div", "grid");
    items.forEach(function(f) { grid.appendChild(buildCard(f, total++)); });
    gallery.appendChild(grid);
  }

  if (activeFilter === "in-ams" || activeFilter === "inbound") {
    const all = Object.values(inHand).reduce(function(a, b) { return a.concat(b); }, []).concat(inTransit);
    if (all.length) renderSection(activeFilter === "in-ams" ? "In AMS" : "Inbound", null, all);
  } else {
    ORDER.forEach(function(mat) { renderSection(mat, null, inHand[mat]); });
    Object.keys(inHand).filter(function(m) { return !ORDER.includes(m); })
      .forEach(function(mat) { renderSection(mat, null, inHand[mat]); });
    if (inTransit.length) renderSection("Inbound", "on the way", inTransit);
  }

  if (total === 0) {
    const empty = mk("div", "empty-state");
    const p = mk("p");
    p.textContent = "No filaments match “" + (q || activeFilter) + "”";
    empty.appendChild(p);
    gallery.appendChild(empty);
  }

  document.getElementById("count").textContent = total + " filament" + (total !== 1 ? "s" : "");

  document.querySelectorAll(".lb-trigger").forEach(function(img) {
    img.onclick = function(e) {
      e.stopPropagation();
      openLb(parseInt(img.dataset.idx));
    };
  });
}

// ── AMS Bay visualization ─────────────────────────────────────────────────────
function formatWeight(g) {
  if (g >= 1000) {
    const kg = g / 1000;
    return { num: (kg >= 10 ? kg.toFixed(0) : kg.toFixed(1)), unit: "kg" };
  }
  return { num: Math.round(g).toString(), unit: "g" };
}

// AMS bay shows the loaded spool only — when an entry covers multiple physical
// spools (count > 1), remaining/total need to reflect the single loaded spool,
// not the aggregate across all spools.
//
// The publish script emits `loaded_weight` and `loaded_remaining` for the
// physically-loaded spool. Prefer those when present. The older `total / count`
// reconstruction is kept as a fallback for old data, but it silently fails for
// merged spools of unequal weight (e.g., 500g + 1000g → 750g "average" — bug
// spotted 2026-05-24 with Black Recycled PLA).
function loadedSpoolStats(f) {
  if (f.loaded_weight != null && f.loaded_remaining != null) {
    return { remaining: f.loaded_remaining, total: f.loaded_weight };
  }
  const total = parseInt(f.weight) || 0;
  const count = f.count || 1;
  if (count <= 1 || !total) return { remaining: f.remaining, total };
  const spool = total / count;
  if (f.remaining <= 0) return { remaining: 0, total: spool };
  const mod = f.remaining % spool;
  return { remaining: mod === 0 ? spool : mod, total: spool };
}

function printingSlotUsage(slotNum) {
  if (!PRINT_STATUS || !PRINT_STATUS.printing) return null;
  for (var i = 0; i < PRINT_STATUS.filaments.length; i++) {
    if (PRINT_STATUS.filaments[i].slot === slotNum) return PRINT_STATUS.filaments[i].usage_g;
  }
  return null;
}

function renderAms() {
  const slotsEl = document.getElementById("ams-slots");
  const statusEl = document.getElementById("ams-status");
  const bay = [null, null, null, null];
  let loaded = 0;
  FILAMENTS.forEach(function(f) {
    const s = f["ams-slot"];
    if (s !== null && s >= 1 && s <= 4 && !bay[s - 1]) {
      bay[s - 1] = f;
      loaded++;
    }
  });

  // AMS bay header — show print status when active
  if (PRINT_STATUS && PRINT_STATUS.printing) {
    statusEl.textContent = "";
    statusEl.className = "ams-bay-printing";
    statusEl.textContent = "Printing — " + PRINT_STATUS.project;
  } else {
    statusEl.textContent = loaded + " of 4 loaded";
    statusEl.className = "ams-bay-status";
  }

  while (slotsEl.firstChild) slotsEl.removeChild(slotsEl.firstChild);

  for (let i = 0; i < 4; i++) {
    const f = bay[i];
    const slotNum = i + 1;
    const usage = printingSlotUsage(slotNum);
    const isPrinting = usage !== null;

    const slotEl = mk("div", f ? "ams-slot loaded" + (isPrinting ? " printing" : "") : "ams-slot empty");
    if (isPrinting && f) {
      const sw = swatchFor(f);
      var pulse = "rgba(200,94,42,0.35)";
      if (sw.solid && sw.solid.charAt(0) === "#") {
        var h = sw.solid, r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
        pulse = "rgba(" + r + "," + g + "," + b + ",0.35)";
      }
      slotEl.style.setProperty("--pulse-color", pulse);
    }

    // Ring wrapper with disc inside
    const ring = mk("div", f ? "slot-ring" : "slot-ring empty");
    if (f) {
      const sw = swatchFor(f);
      const spool = loadedSpoolStats(f);
      const pct = spool.total > 0 ? Math.max(0, Math.min(100, (spool.remaining / spool.total) * 100)) : 100;
      ring.style.setProperty("--pct", pct.toFixed(1));
      ring.style.setProperty("--ring-color", sw.solid);

      if (isPrinting) {
        if (usage > 0 && spool.total > 0) {
          var endRemaining = Math.max(0, spool.remaining - usage);
          var endPct = (endRemaining / spool.total) * 100;
          ring.style.setProperty("--end-pct", endPct.toFixed(1));
          var mark = mk("div", "slot-end-mark");
          mark.style.transform = "rotate(" + (endPct * 3.6) + "deg)";
          ring.appendChild(mark);
        } else {
          ring.style.setProperty("--end-pct", pct.toFixed(1));
        }
      }

      const disc = mk("div", "slot-disc");
      disc.style.background = sw.orb;
      ring.appendChild(disc);
    } else {
      ring.appendChild(mk("div", "slot-disc empty"));
    }
    slotEl.appendChild(ring);

    const numStr = slotNum.toString().padStart(2, "0");
    slotEl.appendChild(txt("div", "slot-num" + (f ? " active" : ""), numStr));

    if (f) {
      slotEl.appendChild(txt("div", "slot-name", f.name));

      // Weight readout — the loaded spool only (not aggregate across spools)
      const spool = loadedSpoolStats(f);
      const weight = mk("div", "slot-weight");
      const fmt = formatWeight(spool.remaining);
      weight.appendChild(txt("span", "slot-weight-num", fmt.num));
      weight.appendChild(txt("span", "slot-weight-unit", fmt.unit));
      if (f.used > 0 && spool.total > 0) {
        const totalFmt = formatWeight(spool.total);
        weight.appendChild(txt("span", "slot-weight-of", "of " + totalFmt.num + totalFmt.unit));
      }
      slotEl.appendChild(weight);

      // Projected usage when printing
      if (isPrinting && usage > 0) {
        const endRemaining = Math.max(0, spool.remaining - usage);
        const proj = mk("div", "slot-projection");
        proj.appendChild(txt("span", "slot-proj-arrow", "→"));
        const endFmt = formatWeight(endRemaining);
        proj.appendChild(txt("span", "slot-proj-end", endFmt.num));
        proj.appendChild(txt("span", "slot-proj-unit", endFmt.unit));
        slotEl.appendChild(proj);
      }

      const mb = matBadge(f);
      slotEl.appendChild(txt("div", "slot-meta" + (f.is_recycled ? " rpla" : ""), mb.text));

      slotEl.title = f.name + " — " + Math.round(spool.remaining) + "g of " + (spool.total || "?") + "g remaining on loaded spool"
        + (isPrinting ? " (printing: -" + usage + "g projected)" : "")
        + (f.count > 1 ? " (" + Math.round(f.remaining) + "g total across " + f.count + " spools)" : "");
      slotEl.onclick = function() {
        document.getElementById("search").value = "";
        searchQuery = "";
        document.querySelectorAll(".pill").forEach(function(b) { b.classList.remove("active"); });
        document.querySelector('.pill[data-filter="all"]').classList.add("active");
        activeFilter = "all";
        render();
        const idx = lbData.indexOf(f);
        if (idx >= 0) openLb(idx);
      };
    } else {
      slotEl.appendChild(txt("div", "slot-name empty", "Empty"));
      slotEl.appendChild(txt("div", "slot-weight-placeholder", "—"));
    }

    slotsEl.appendChild(slotEl);
  }
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
var lbIdx = 0;
const lb    = document.getElementById("lightbox");
const lbImg = document.getElementById("lb-img");
const lbNameEl = document.getElementById("lb-name");
const lbMeta   = document.getElementById("lb-meta");

function updateLb() {
  if (!lbData.length) return;
  const f = lbData[lbIdx];
  lbImg.src = f.image;
  lbImg.alt = f.name;
  lbNameEl.textContent = f.name;

  while (lbMeta.firstChild) lbMeta.removeChild(lbMeta.firstChild);
  const chips = [
    f.material,
    f.weight  || null,
    f.label   || null,
    f["ams-slot"] != null ? "AMS Slot " + f["ams-slot"] : null,
    f.spool ? (SPOOL_LABEL[f.spool] || f.spool) : null,
  ].filter(Boolean);
  chips.forEach(function(c, i) {
    lbMeta.appendChild(txt("span", "lb-chip" + (i < 2 ? " hi" : ""), c));
  });
}

function openLb(idx) { lbIdx = idx; updateLb(); lb.showModal(); }
function lbNext() { lbIdx = (lbIdx + 1) % lbData.length; updateLb(); }
function lbPrev() { lbIdx = (lbIdx - 1 + lbData.length) % lbData.length; updateLb(); }

document.getElementById("lb-next").onclick = lbNext;
document.getElementById("lb-prev").onclick = lbPrev;
document.getElementById("lb-close").onclick = function() { lb.close(); };
lb.addEventListener("click", function(e) { if (e.target === lb) lb.close(); });
document.addEventListener("keydown", function(e) {
  if (lb.open) {
    if (e.key === "ArrowRight") lbNext();
    if (e.key === "ArrowLeft")  lbPrev();
    return;
  }
  if (e.key === "/" && e.target.tagName !== "INPUT") {
    e.preventDefault();
    document.getElementById("search").focus();
  }
});

// ── Controls ──────────────────────────────────────────────────────────────────
document.querySelectorAll(".pill").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".pill").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById("search").addEventListener("input", function(e) {
  searchQuery = e.target.value;
  render();
});

// ── Init ──────────────────────────────────────────────────────────────────────
computeStats();
render();
renderPrintHero();
renderAms();
</script>
